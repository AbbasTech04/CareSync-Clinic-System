<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareSync - Our Doctors</title>
    
    <!-- Custom fonts for SB Admin 2-->
    <link href="/assets/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for SB Admin 2-->
    <link href="/assets/css/sb-admin-2.min.css" rel="stylesheet">

    <!-- Custom CSS for uniform doctor images -->
    <style>
        .doctor-img-card {
            width: 100%;
            height: 300px; /* Fixed height to keep cards aligned */
            object-fit: cover; /* Ensures the image doesn't stretch */
            object-position: top; /* Focuses on the face */
        }
        .brand-logo {
            font-weight: 800;
            color: #4e73df;
            font-size: 1.5rem;
            text-decoration: none;
        }
    </style>
</head>
<body id="page-top">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <!-- Brand -->
                    <a class="brand-logo mx-3" href="/">
                        <i class="fas fa-heartbeat"></i> CareSync
                    </a>
                    
                    <!-- Topbar Navbar -->
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <a class="nav-link text-gray-600" href="/admin">
                                <i class="fas fa-user-shield mr-2"></i> Reception Desk
                            </a>
                        </li>
                    </ul>
                </nav>
                <!-- End of Topbar -->

                <!-- Begin Page Content -->
                <div class="container-fluid mt-5">

                    <!-- Page Heading -->
                    <div class="d-sm-flex align-items-center justify-content-between mb-5 text-center w-100">
                        <h1 class="h3 mb-0 text-gray-800 w-100 font-weight-bold">Meet Our Specialists</h1>
                    </div>

                    <!-- Doctors Grid -->
                    <div class="row justify-content-center">

                        <!-- Thymeleaf Loop: Iterate over the 'doctors' list sent from WebController -->
                        <div class="col-lg-3 col-md-4 col-sm-6 mb-4" th:each="doctor : ${doctors}">
                            
                            <!-- Doctor Card -->
                            <div class="card shadow h-100">
                                <!-- Doctor Image -->
                                <img th:src="@{${doctor.imageUrl}}" class="card-img-top doctor-img-card" th:alt="${doctor.name}">
                                
                                <!-- Card Body -->
                                <div class="card-body text-center">
                                    <!-- Doctor Name -->
                                    <h5 class="card-title font-weight-bold text-primary" th:text="${doctor.name}">Doctor Name</h5>
                                    <!-- Specialty -->
                                    <p class="card-text text-gray-600 mb-4" th:text="${doctor.specialty}">Specialty</p>
                                    
                                    <!-- Book Button -->
                                    <a th:href="@{/book/{id}(id=${doctor.id})}" class="btn btn-primary btn-block rounded-pill">
                                        <i class="fas fa-calendar-plus mr-1"></i> Book Appointment
                                    </a>
                                </div>
                            </div>

                        </div>
                        <!-- End of Thymeleaf Loop -->

                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white mt-5">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; CareSync Clinic 2026</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Bootstrap core JavaScript-->
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="/assets/vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="/assets/js/sb-admin-2.min.js"></script>

</body>
</html>
