<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - CareSync</title>
    
    <!-- Custom fonts for SB Admin 2-->
    <link href="/assets/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for SB Admin 2-->
    <link href="/assets/css/sb-admin-2.min.css" rel="stylesheet">
    
    <style>
        .brand-logo { font-weight: 800; color: #4e73df; font-size: 1.5rem; text-decoration: none; }
        .doctor-img-sidebar { width: 100%; height: auto; border-radius: 5px; }
    </style>
</head>
<body id="page-top" class="bg-light">

    <!-- Topbar -->
    <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
        <a class="brand-logo mx-3" href="/">
            <i class="fas fa-heartbeat"></i> CareSync
        </a>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link text-gray-600" href="/">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Doctors
                </a>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        
        <!-- Error Alert (Shows only if there is a conflict or weekend booking attempt) -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="fas fa-exclamation-triangle mr-2"></i>
            <span th:text="${errorMessage}">Error Message Here</span>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        </div>

        <div class="row">
            <!-- Left Column: Doctor Info -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow border-left-primary">
                    <div class="card-body text-center">
                        <img th:src="@{${doctor.imageUrl}}" class="doctor-img-sidebar mb-3 shadow-sm" alt="Doctor Image">
                        <h4 class="font-weight-bold text-gray-800" th:text="${doctor.name}">Dr. Name</h4>
                        <span class="badge badge-primary px-3 py-2 mb-3" th:text="${doctor.specialty}">Specialty</span>
                        <hr>
                        <p class="text-gray-600 small text-left" th:text="${doctor.bio}">Doctor Bio...</p>
                    </div>
                </div>
            </div>

            <!-- Right Column: Booking Form -->
            <div class="col-lg-8">
                <div class="card shadow mb-4">
                    <div class="card-header py-3 bg-primary">
                        <h6 class="m-0 font-weight-bold text-white"><i class="fas fa-calendar-check mr-2"></i>Appointment Details</h6>
                    </div>
                    <div class="card-body">
                        
                        <!-- The Form: Bound to the 'appointment' object -->
                        <form th:action="@{/book/{id}(id=${doctor.id})}" th:object="${appointment}" method="POST">
                            
                            <div class="form-row">
                                <!-- Patient Name -->
                                <div class="form-group col-md-6">
                                    <label for="patientName" class="text-gray-800 font-weight-bold">Full Name *</label>
                                    <input type="text" class="form-control" id="patientName" th:field="*{patientName}" placeholder="e.g. John Doe" required>
                                </div>
                                
                                <!-- Patient Phone -->
                                <div class="form-group col-md-6">
                                    <label for="patientPhone" class="text-gray-800 font-weight-bold">Phone Number *</label>
                                    <input type="tel" class="form-control" id="patientPhone" th:field="*{patientPhone}" placeholder="e.g. 05X XXX XXXX" required>
                                </div>
                            </div>

                            <!-- Condition Description -->
                            <div class="form-group">
                                <label for="conditionDescription" class="text-gray-800 font-weight-bold">Condition Description</label>
                                <textarea class="form-control" id="conditionDescription" th:field="*{conditionDescription}" rows="3" placeholder="Briefly describe your symptoms..."></textarea>
                            </div>

                            <div class="form-row mt-4">
                                <!-- Date Picker -->
                                <div class="form-group col-md-6">
                                    <label for="appointmentDate" class="text-gray-800 font-weight-bold">Date *</label>
                                    <input type="date" class="form-control" id="appointmentDate" th:field="*{appointmentDate}" required>
                                    <small class="text-muted">Weekends (Sat & Sun) are off.</small>
                                </div>
                                
                                <!-- Time Picker -->
                                <div class="form-group col-md-6">
                                    <label for="appointmentTime" class="text-gray-800 font-weight-bold">Time *</label>
                                    <input type="time" class="form-control" id="appointmentTime" th:field="*{appointmentTime}" required>
                                </div>
                            </div>

                            <hr class="mt-4">
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-success btn-lg btn-block mt-3 shadow-sm">
                                <i class="fas fa-check-circle mr-2"></i> Confirm Booking
                            </button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="/assets/js/sb-admin-2.min.js"></script>

    <!-- Optional: Restrict past dates in the datepicker -->
    <script>
        $(document).ready(function(){
            var dtToday = new Date();
            var month = dtToday.getMonth() + 1;
            var day = dtToday.getDate();
            var year = dtToday.getFullYear();
            if(month < 10) month = '0' + month.toString();
            if(day < 10) day = '0' + day.toString();
            var minDate = year + '-' + month + '-' + day;
            $('#appointmentDate').attr('min', minDate);
        });
    </script>
</body>
</html>
