<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reception Dashboard - CareSync</title>
    
    <!-- Custom fonts for SB Admin 2-->
    <link href="/assets/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">

    <!-- Custom styles for SB Admin 2-->
    <link href="/assets/css/sb-admin-2.min.css" rel="stylesheet">
    
    <!-- Custom styles for this page (DataTables) -->
    <link href="/assets/vendor/datatables/dataTables.bootstrap4.min.css" rel="stylesheet">

    <style>
        .brand-logo { font-weight: 800; color: #4e73df; font-size: 1.5rem; text-decoration: none; }
    </style>
</head>
<body id="page-top" class="bg-light">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topbar -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <a class="brand-logo mx-3" href="/">
                        <i class="fas fa-heartbeat"></i> CareSync Admin
                    </a>
                    
                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item">
                            <a class="nav-link text-gray-600" href="/">
                                <i class="fas fa-home mr-2"></i> Public Site
                            </a>
                        </li>
                    </ul>
                </nav>
                <!-- End of Topbar -->

                <!-- Begin Page Content -->
                <div class="container-fluid mt-4">

                    <!-- Page Heading -->
                    <h1 class="h3 mb-4 text-gray-800 font-weight-bold">
                        <i class="fas fa-calendar-alt mr-2"></i>Appointments Dashboard
                    </h1>

                    <!-- DataTales Example -->
                    <div class="card shadow mb-4">
                        <div class="card-header py-3 bg-primary">
                            <h6 class="m-0 font-weight-bold text-white">All Scheduled Appointments</h6>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-bordered table-hover" id="dataTable" width="100%" cellspacing="0">
                                    <thead class="thead-light">
                                        <tr>
                                            <th>Ref Number</th>
                                            <th>Patient Name</th>
                                            <th>Phone</th>
                                            <th>Doctor</th>
                                            <th>Date</th>
                                            <th>Time</th>
                                            <th>Condition/Notes</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Thymeleaf Loop for Appointments -->
                                        <tr th:each="app : ${appointments}">
                                            <td class="font-weight-bold text-primary" th:text="${app.referenceNumber}">REF-123</td>
                                            <td th:text="${app.patientName}">Patient Name</td>
                                            <td th:text="${app.patientPhone}">0500000000</td>
                                            <td th:text="${app.doctor.name}">Dr. Name</td>
                                            <!-- Format Date and Time slightly for better readability if needed, or just display directly -->
                                            <td th:text="${app.appointmentDate}">YYYY-MM-DD</td>
                                            <td th:text="${app.appointmentTime}">HH:MM</td>
                                            <td th:text="${app.conditionDescription}">Symptoms...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white mt-4">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; CareSync Clinic 2026</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Bootstrap core JavaScript-->
    <script src="/assets/vendor/jquery/jquery.min.js"></script>
    <script src="/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="/assets/vendor/jquery-easing/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="/assets/js/sb-admin-2.min.js"></script>

    <!-- Page level plugins (DataTables) -->
    <script src="/assets/vendor/datatables/jquery.dataTables.min.js"></script>
    <script src="/assets/vendor/datatables/dataTables.bootstrap4.min.js"></script>

   <!-- Page level custom scripts (Initialize DataTable) -->
    <script>
        $(document).ready(function() {
            $('#dataTable').DataTable({
                // Add spaces between the brackets so Thymeleaf doesn't parse it
                "order": [ [ 4, "desc" ], [ 5, "desc" ] ] 
            });
        });
    </script>

</body>
</html>
